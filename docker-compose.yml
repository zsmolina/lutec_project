services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      TEMP_DIR: /app/storage/tmp
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
    volumes:
      - lutec-storage:/app/storage
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  lutec-storage:
